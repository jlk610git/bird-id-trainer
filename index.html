<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0e1613" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Bird ID Trainer</title>
<style>
  :root {
    --bg: #0e1613;
    --panel: #15201c;
    --panel-2: #1c2b25;
    --ink: #f2f6f3;
    --muted: #93a89c;
    --accent: #6ee7a0;
    --accent-ink: #06140c;
    --good: #5eead4;
    --bad: #fb7185;
    --warn: #fbbf24;
    --line: #283933;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(900px 500px at 80% -15%, rgba(110,231,160,.10), transparent),
      radial-gradient(1100px 600px at 15% -10%, rgba(94,234,212,.06), transparent),
      var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 28px 18px 64px; }
  header { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  h1 { font-size: 1.45rem; margin: 0; letter-spacing: -.01em; font-weight: 700; display: inline-flex; align-items: center; gap: 9px; }
  h1 .logo { color: var(--accent); flex: none; }
  .scoreboard { display: flex; gap: 18px; font-size: .82rem; align-items: baseline; }
  .scoreboard > span { display: inline-flex; flex-direction: column; align-items: center; gap: 1px; }
  .scoreboard b { font-size: 1.15rem; font-variant-numeric: tabular-nums; line-height: 1; }
  .scoreboard .stat-muted { font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; }
  .stat-good { color: var(--good); }
  .stat-bad { color: var(--bad); }
  .stat-muted { color: var(--muted); }

  .card {
    background: linear-gradient(180deg, rgba(255,255,255,.015), transparent), var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 16px 40px rgba(0,0,0,.30);
  }

  .photos {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .photos a {
    display: block;
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    overflow: hidden;
    background: var(--panel-2);
    border: 1px solid var(--line);
    position: relative;
  }
  .photos img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photos .credit {
    position: absolute; bottom: 0; left: 0; right: 0;
    font-size: .65rem; color: #dfeede; background: linear-gradient(transparent, rgba(0,0,0,.7));
    padding: 14px 6px 4px; opacity: 0; transition: opacity .15s;
    text-decoration: none;
  }
  .photos a:hover .credit { opacity: 1; }
  @media (max-width: 560px) { .photos { grid-template-columns: 1fr; } .photos a { aspect-ratio: 16/10; } }

  .loading, .errorbox {
    display: grid; place-items: center; min-height: 160px; color: var(--muted);
    text-align: center; gap: 10px;
  }
  .spinner {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--accent);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  form.answer { margin-top: 16px; display: grid; gap: 12px; }
  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 560px) { .fields { grid-template-columns: 1fr; } }
  .field label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .6px; }
  .field input {
    width: 100%; padding: 12px 13px; font-size: 1.05rem; border-radius: 10px;
    background: var(--panel-2); color: var(--ink); border: 1px solid var(--line); outline: none;
  }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(95,191,125,.18); }
  .hint { font-size: .78rem; color: var(--muted); }

  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  button {
    font: inherit; cursor: pointer; border-radius: 10px; padding: 11px 18px;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink);
    transition: transform .04s ease, background .15s;
  }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; font-weight: 650; }
  button.ghost { background: transparent; }
  button:disabled { opacity: .5; cursor: not-allowed; }

  .feedback { margin-top: 14px; border-radius: 12px; padding: 14px 16px; border: 1px solid var(--line); display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: rgba(74,222,128,.08); border-color: rgba(74,222,128,.4); }
  .feedback.incorrect { background: rgba(248,113,113,.08); border-color: rgba(248,113,113,.4); }
  .feedback .verdict { font-weight: 700; font-size: 1.05rem; margin-bottom: 4px; }
  .feedback .answer-line { color: var(--ink); }
  .feedback .answer-line .truth { color: var(--accent); font-weight: 650; }
  .feedback .yours { color: var(--muted); font-size: .9rem; margin-top: 2px; }
  .feedback .actions { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }

  footer { margin-top: 26px; color: var(--muted); font-size: .8rem; text-align: center; line-height: 1.6; }
  footer a { color: var(--accent); }
  .reset { background: none; border: none; color: var(--muted); text-decoration: underline; cursor: pointer; font-size: .8rem; padding: 0; }
  kbd { background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 1px 6px; font-size: .8rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>
      <svg class="logo" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="7" cy="13" r="4.2" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="17" cy="13" r="4.2" stroke="currentColor" stroke-width="1.6"/>
        <path d="M7 8.8V6.2a1.2 1.2 0 0 1 1.2-1.2h1.1a1.2 1.2 0 0 1 1.2 1.2v2.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M17 8.8V6.2A1.2 1.2 0 0 0 15.8 5h-1.1a1.2 1.2 0 0 0-1.2 1.2v2.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M11.2 12h1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      Bird ID Trainer
    </h1>
    <div class="scoreboard">
      <span><span class="stat-good"><b id="score-correct">0</b></span> <span class="stat-muted">correct</span></span>
      <span><span class="stat-bad"><b id="score-wrong">0</b></span> <span class="stat-muted">wrong</span></span>
      <span><b id="score-pct" class="stat-muted">—</b> <span class="stat-muted">accuracy</span></span>
    </div>
  </header>

  <div class="card">
    <div id="photos" class="photos" aria-live="polite"></div>

    <form class="answer" id="answer-form" autocomplete="off">
      <div class="fields">
        <div class="field">
          <label for="descriptor">Species <span style="text-transform:none">(e.g. Ruby-Throated)</span></label>
          <input id="descriptor" name="descriptor" type="text" spellcheck="false" autocapitalize="off" />
        </div>
        <div class="field">
          <label for="type">Genus <span style="text-transform:none">(e.g. Hummingbird)</span></label>
          <input id="type" name="type" type="text" spellcheck="false" autocapitalize="off" />
        </div>
      </div>
      <div class="row">
        <button type="submit" class="primary" id="submit-btn">Check answer</button>
        <button type="button" class="ghost" id="skip-btn">Skip / I don't know</button>
        <span class="hint">Some birds are one word (e.g. <em>Mallard</em>) — just use the Genus box.</span>
      </div>
    </form>

    <div class="feedback" id="feedback"></div>
  </div>

  <footer>
    <p>Photos &amp; species data from the <a href="https://www.inaturalist.org" target="_blank" rel="noopener">iNaturalist</a> open API (community-verified, CC-licensed). Hover a photo for credit.</p>
    <p><button class="reset" id="reset-score">Reset score</button> &nbsp;·&nbsp; Press <kbd>Enter</kbd> to check, then <kbd>Enter</kbd> again for the next bird.</p>
  </footer>
</div>

<script>
const API = "https://api.inaturalist.org/v1";

// Curated list of recognizable birds. Common name -> we split into descriptor + type.
const BIRDS = [
  "Ruby-throated Hummingbird", "Northern Cardinal", "American Robin", "Blue Jay",
  "Bald Eagle", "Red-tailed Hawk", "American Goldfinch", "Mourning Dove",
  "Mallard", "Canada Goose", "Great Blue Heron", "Downy Woodpecker",
  "Red-winged Blackbird", "Black-capped Chickadee", "House Sparrow", "European Starling",
  "Barn Swallow", "American Crow", "Pileated Woodpecker", "Eastern Bluebird",
  "Belted Kingfisher", "Cedar Waxwing", "Tufted Titmouse", "White-breasted Nuthatch",
  "Northern Flicker", "Osprey", "Great Horned Owl", "Snowy Owl",
  "Wood Duck", "Wild Turkey", "Sandhill Crane", "American Kestrel",
  "Indigo Bunting", "Baltimore Oriole", "Rose-breasted Grosbeak", "Scarlet Tanager",
  "Ruby-crowned Kinglet", "Carolina Wren", "Dark-eyed Junco", "Common Loon",
  "Double-crested Cormorant", "Turkey Vulture", "Peregrine Falcon", "Killdeer",
  "American Robin", "Yellow Warbler", "Painted Bunting", "Red-bellied Woodpecker"
];

// --- Score persistence ---
const SCORE_KEY = "birdid.score.v1";
let score = loadScore();
function loadScore() {
  try { return JSON.parse(localStorage.getItem(SCORE_KEY)) || { correct: 0, wrong: 0 }; }
  catch { return { correct: 0, wrong: 0 }; }
}
function saveScore() { localStorage.setItem(SCORE_KEY, JSON.stringify(score)); }
function renderScore() {
  document.getElementById("score-correct").textContent = score.correct;
  document.getElementById("score-wrong").textContent = score.wrong;
  const total = score.correct + score.wrong;
  document.getElementById("score-pct").textContent = total ? Math.round(100 * score.correct / total) + "%" : "—";
}

// --- Name splitting: last word is the "type", the rest is the "descriptor" ---
function splitName(name) {
  const parts = name.trim().split(/\s+/);
  const type = parts[parts.length - 1];
  const descriptor = parts.slice(0, -1).join(" ");
  return { descriptor, type };
}

// --- Text normalization for forgiving comparison ---
function normalize(s) {
  return (s || "")
    .toLowerCase().trim()
    .replace(/[‐-―]/g, "-")   // unicode dashes -> hyphen
    .replace(/[^a-z\- ]/g, "")          // strip punctuation
    .replace(/\s*-\s*/g, "-")           // tidy hyphens
    .replace(/\s+/g, " ");
}
function loose(s) { return normalize(s).replace(/[-\s]/g, ""); } // ignore spaces/hyphens entirely

// Levenshtein for spelling-tolerance suggestion
function editDistance(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(dp[i-1][j] + 1, dp[i][j-1] + 1, dp[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1));
  return dp[m][n];
}
// "close" = exact when normalized, or small edit distance (likely a typo)
function closeMatch(given, truth) {
  const g = normalize(given), t = normalize(truth);
  if (!t) return !g; // truth empty (single-word bird) -> given should be empty
  if (g === t) return true;
  if (loose(given) === loose(truth)) return true;
  const d = editDistance(loose(given), loose(truth));
  return d > 0 && d <= Math.max(1, Math.floor(loose(truth).length / 5));
}

// --- Fetch a bird with 3 photos ---
const taxonCache = {};
async function resolveTaxonId(name) {
  if (taxonCache[name]) return taxonCache[name];
  const res = await fetch(`${API}/taxa?q=${encodeURIComponent(name)}&rank=species&per_page=1`);
  const data = await res.json();
  const r = data.results && data.results[0];
  if (!r) throw new Error("taxon not found: " + name);
  const info = { id: r.id, common: r.preferred_common_name || name };
  taxonCache[name] = info;
  return info;
}
async function fetchObservationsPhotos(taxonId) {
  const res = await fetch(`${API}/observations?taxon_id=${taxonId}&photos=true&quality_grade=research&per_page=40&order_by=votes&order=desc`);
  const data = await res.json();
  const photos = [];
  for (const o of (data.results || [])) {
    for (const p of (o.photos || [])) {
      if (!p.url) continue;
      photos.push({
        url: p.url.replace("square", "medium"),
        attribution: p.attribution || "© iNaturalist contributor",
        link: `https://www.inaturalist.org/observations/${o.id}`
      });
    }
  }
  return photos;
}
function pickN(arr, n) {
  const copy = arr.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy.slice(0, n);
}

let current = null; // { name, descriptor, type, photos }
let answered = false;

function showLoading() {
  document.getElementById("photos").innerHTML =
    `<div class="loading" style="grid-column:1/-1"><div class="spinner"></div><div>Finding a bird…</div></div>`;
}
function showError(msg) {
  document.getElementById("photos").innerHTML =
    `<div class="errorbox" style="grid-column:1/-1"><div>⚠️ ${msg}</div><button class="primary" onclick="nextBird()">Try again</button></div>`;
}

async function nextBird() {
  answered = false;
  hideFeedback();
  setFormEnabled(true);
  document.getElementById("descriptor").value = "";
  document.getElementById("type").value = "";
  showLoading();
  document.getElementById("submit-btn").textContent = "Check answer";

  // Try a few birds in case one has too few photos.
  const order = pickN(BIRDS, BIRDS.length);
  for (const name of order) {
    try {
      const tax = await resolveTaxonId(name);
      const photos = await fetchObservationsPhotos(tax.id);
      if (photos.length < 3) continue;
      const chosen = pickN(photos, 3);
      const { descriptor, type } = splitName(name);
      current = { name, descriptor, type, photos: chosen, common: tax.common };
      renderPhotos(chosen);
      document.getElementById("descriptor").focus();
      return;
    } catch (e) { /* try next */ }
  }
  showError("Couldn't load bird photos right now. Check your connection.");
}

function renderPhotos(photos) {
  document.getElementById("photos").innerHTML = photos.map(p =>
    `<a href="${p.link}" target="_blank" rel="noopener">
       <img src="${p.url}" alt="Mystery bird" loading="lazy" />
       <span class="credit">${escapeHtml(p.attribution)}</span>
     </a>`).join("");
}
function escapeHtml(s) { return (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c])); }

function setFormEnabled(on) {
  document.getElementById("descriptor").disabled = !on;
  document.getElementById("type").disabled = !on;
  document.getElementById("skip-btn").disabled = !on;
}
function hideFeedback() {
  const fb = document.getElementById("feedback");
  fb.className = "feedback"; fb.innerHTML = "";
}

function check() {
  if (!current || answered) return;
  const gDesc = document.getElementById("descriptor").value;
  const gType = document.getElementById("type").value;

  const descOk = closeMatch(gDesc, current.descriptor);
  const typeOk = closeMatch(gType, current.type);
  const correct = descOk && typeOk;

  answered = true;
  setFormEnabled(false);

  if (correct) {
    score.correct++; saveScore(); renderScore();
    renderFeedback(true, gDesc, gType, false);
  } else {
    score.wrong++; saveScore(); renderScore();
    // Was it likely just a spelling slip? offer override.
    const closeButTyped =
      ((current.descriptor && !descOk && normalize(gDesc)) || (!typeOk && normalize(gType)));
    renderFeedback(false, gDesc, gType, true);
  }
  document.getElementById("submit-btn").textContent = "Next bird →";
}

function renderFeedback(correct, gDesc, gType, allowOverride) {
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (correct ? "correct" : "incorrect");
  const truth = current.descriptor ? `${current.descriptor} ${current.type}` : current.type;
  let html = "";
  if (correct) {
    html += `<div class="verdict" style="color:var(--good)">✅ Correct!</div>`;
    html += `<div class="answer-line">It's a <span class="truth">${escapeHtml(properName(current.name))}</span>.</div>`;
  } else {
    html += `<div class="verdict" style="color:var(--bad)">❌ Not quite</div>`;
    html += `<div class="answer-line">Correct answer: <span class="truth">${escapeHtml(properName(current.name))}</span></div>`;
    html += `<div class="yours">You typed: "${escapeHtml((gDesc + " " + gType).trim()) || "(blank)"}"</div>`;
  }
  html += `<div class="actions">`;
  if (!correct && allowOverride) {
    html += `<button type="button" class="ghost" id="override-btn">✏️ I just misspelled it — mark correct</button>`;
  }
  html += `<button type="button" class="primary" id="next-btn">Next bird →</button>`;
  html += `</div>`;
  fb.innerHTML = html;

  const ov = document.getElementById("override-btn");
  if (ov) ov.addEventListener("click", overrideCorrect);
  document.getElementById("next-btn").addEventListener("click", nextBird);
}

function properName(name) {
  // Title-case display
  return name;
}

function overrideCorrect() {
  // Move one from wrong to correct.
  score.wrong = Math.max(0, score.wrong - 1);
  score.correct++;
  saveScore(); renderScore();
  const fb = document.getElementById("feedback");
  fb.className = "feedback show correct";
  fb.innerHTML =
    `<div class="verdict" style="color:var(--good)">✅ Counted as correct</div>
     <div class="answer-line">It's a <span class="truth">${escapeHtml(current.name)}</span>.</div>
     <div class="actions"><button type="button" class="primary" id="next-btn2">Next bird →</button></div>`;
  document.getElementById("next-btn2").addEventListener("click", nextBird);
}

// --- Events ---
document.getElementById("answer-form").addEventListener("submit", (e) => {
  e.preventDefault();
  if (answered) nextBird(); else check();
});
document.getElementById("skip-btn").addEventListener("click", () => {
  if (!current || answered) return;
  score.wrong++; saveScore(); renderScore();
  answered = true; setFormEnabled(false);
  renderFeedback(false, "", "", false);
  document.getElementById("submit-btn").textContent = "Next bird →";
});
document.getElementById("reset-score").addEventListener("click", () => {
  score = { correct: 0, wrong: 0 }; saveScore(); renderScore();
});

renderScore();
nextBird();
</script>
</body>
</html>
